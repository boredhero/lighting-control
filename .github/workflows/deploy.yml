name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Inject version from info.yml
        run: |
          VERSION=$(grep '^version:' info.yml | awk '{print $2}')
          sed -i "s/__LIGHTING_VERSION__/$VERSION/" pyproject.toml
          echo "Injected version $VERSION into pyproject.toml"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        run: npm install -g pnpm && pnpm install && pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          envs: GHCR_TOKEN,DEPLOY_SHA
          script: |
            set -e
            IMAGE="ghcr.io/boredhero/lighting-control"

            mkdir -p ~/lighting-control

            # Pull by SHA tag (guarantees we get THIS build)
            OLD_ID=$(docker images ${IMAGE}:latest -q 2>/dev/null || echo "none")
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u boredhero --password-stdin
            docker pull ${IMAGE}:${DEPLOY_SHA}
            docker tag ${IMAGE}:${DEPLOY_SHA} ${IMAGE}:latest
            NEW_ID=$(docker images ${IMAGE}:latest -q)
            echo "Image: old=${OLD_ID} new=${NEW_ID} sha=${DEPLOY_SHA}"

            cd ~/lighting-control
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            docker compose -f docker-compose.prod.yml ps

            # Reload nginx if config exists
            sudo nginx -t && sudo systemctl reload nginx || true

            # Health check loop
            for i in 1 2 3 4 5 6; do
              curl -sf http://localhost:8420/api/health && echo " [deploy OK]" && break
              sleep 10
            done

      - name: Copy compose and nginx config
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: ~/lighting-control/
